name: build

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Get build number and rename JAR
        id: build_number
        run: |
          LAST_NUM=$(git ls-remote --tags origin | grep -o 'v[0-9]*' | sed 's/v//' | sort -n | tail -n1)
          if [ -z "$LAST_NUM" ]; then
            NEXT_NUM=1
          else
            NEXT_NUM=$((LAST_NUM + 1))
          fi
          echo "next_number=$NEXT_NUM" >> $GITHUB_OUTPUT

          ORIGINAL_JAR="target/discord-rpc.jar"
          NEW_JAR="target/discord-rpc-${NEXT_NUM}.jar"

          if [ ! -f "$ORIGINAL_JAR" ]; then
            echo "❌ ERROR: JAR not found at $ORIGINAL_JAR"
            ls -la target/
            exit 1
          fi

          mv "$ORIGINAL_JAR" "$NEW_JAR"
          echo "JAR_FILE=$NEW_JAR" >> "$GITHUB_ENV"
          echo "JAR_NAME=discord-rpc-${NEXT_NUM}.jar" >> "$GITHUB_ENV"
          echo "✅ Renamed to: discord-rpc-${NEXT_NUM}.jar"

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## Changes" > CHANGELOG.md

          if [ -z "$LAST_TAG" ]; then
            echo "_Initial release_" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "_Changes since ${LAST_TAG}_" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.JAR_FILE }}
          tag_name: v${{ steps.build_number.outputs.next_number }}
          name: discord-rpc Build ${{ steps.build_number.outputs.next_number }}
          body_path: CHANGELOG.md
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
